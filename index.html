<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NPTEL ESD Quiz Portal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>NPTEL: Education for Sustainable Development</h1>
        <p>Week-wise MCQ Study + Test Portal (Custom NPTEL Questions)</p>
      </div>
      <div class="mode-toggle">
        <button id="themeToggleBtn" class="mode-btn">Light Theme</button>
        <button id="studyModeBtn" class="mode-btn active">Study Mode</button>
        <button id="testModeBtn" class="mode-btn">Test Mode</button>
      </div>
    </header>

    <main id="mainLayout" class="layout">
      <aside class="sidebar">
        <h2>Weeks</h2>
        <div id="weekList" class="week-list"></div>
      </aside>

      <section class="content">
        <div id="contentHeader" class="content-header"></div>

        <div id="studySection" class="panel"></div>

        <div id="testSection" class="panel hidden">
          <div id="testControls" class="test-controls">
            <button id="startTestBtn" class="primary-btn">Configure & Start Test</button>
            <button id="resetTestBtn" class="ghost-btn hidden">Reset</button>
          </div>
          <div id="testProgress" class="test-progress hidden"></div>
          <div id="testQuestions"></div>
          <div id="resultBox" class="result-box hidden"></div>
        </div>
      </section>
    </main>
  </div>

  <div id="welcomeModal" class="modal-overlay">
    <div class="modal-card">
      <h3>Welcome</h3>
      <p>How do you want to start?</p>
      <div class="modal-actions">
        <button id="choosePracticeBtn" class="ghost-btn">Practice Mode</button>
        <button id="chooseTestBtn" class="primary-btn">Test Mode</button>
      </div>
    </div>
  </div>

  <div id="testSetupModal" class="modal-overlay hidden">
    <div class="modal-card">
      <h3>Start Test</h3>
      <p>Choose test type and options before starting.</p>
      <label for="testScopeSelect" class="control-label">Test Type</label>
      <select id="testScopeSelect" class="control-input">
        <option value="selected">Selected Week Test</option>
        <option value="all">All Weeks Test</option>
      </select>
      <label for="testWeekSelect" class="control-label">Choose Week</label>
      <select id="testWeekSelect" class="control-input"></select>
      <label class="control-check">
        <input id="shuffleToggle" type="checkbox" />
        <span>Shuffle Questions</span>
      </label>
      <label for="timerModeSelect" class="control-label">Timer (optional)</label>
      <select id="timerModeSelect" class="control-input">
        <option value="off">No timer</option>
        <option value="preset">Preset duration</option>
        <option value="custom">Custom minutes</option>
      </select>
      <select id="timerPresetSelect" class="control-input hidden">
        <option value="5">5 minutes</option>
        <option value="10">10 minutes</option>
        <option value="15">15 minutes</option>
        <option value="20">20 minutes</option>
        <option value="30">30 minutes</option>
        <option value="45">45 minutes</option>
        <option value="60">60 minutes</option>
      </select>
      <input id="timerCustomInput" class="control-input hidden" type="number" min="1" max="240" placeholder="Minutes (1-240)" />
      <div class="modal-actions">
        <button id="cancelSetupBtn" class="ghost-btn">Cancel</button>
        <button id="confirmStartTestBtn" class="primary-btn">Start Now</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
